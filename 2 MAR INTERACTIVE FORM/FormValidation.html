<!DOCTYPE html>
<html>
<head>
    <title>Interactive Form</title>

    <style>
        body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #74ebd5, #9face6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    color: #2c3e50;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    transition: 0.3s;
    font-size: 14px;
}

input:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 5px rgba(52,152,219,0.5);
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #3498db, #6dd5fa);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    background: linear-gradient(to right, #2980b9, #57c1eb);
}

.error {
    color: #e74c3c;
    font-size: 13px;
    text-align: left;
}

.success {
    color: #27ae60;
    font-weight: bold;
    margin-top: 10px;
}
    </style>
</head>
<body>

    <div class="container">
        <h2>Signup Form</h2>

        <input type="text" id="name" placeholder="Enter Name">
        <div id="nameError" class="error"></div>

        <input type="email" id="email" placeholder="Enter Email">
        <div id="emailError" class="error"></div>

        <input type="password" id="password" placeholder="Enter Password">
        <div id="passError" class="error"></div>

        <button onclick="validateForm()">Submit</button>

        <div id="successMsg" class="success"></div>
    </div>

    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            let valid = true;

            document.getElementById("nameError").innerText = "";
            document.getElementById("emailError").innerText = "";
            document.getElementById("passError").innerText = "";
            document.getElementById("successMsg").innerText = "";

            if (name === "") {
                document.getElementById("nameError").innerText = "Name is required";
                valid = false;
            }

            if (!email.includes("@")) {
                document.getElementById("emailError").innerText = "Enter valid email";
                valid = false;
            }

            if (password.length < 6) {
                document.getElementById("passError").innerText = "Password must be at least 6 characters";
                valid = false;
            }

            if (valid) {
                document.getElementById("successMsg").innerText = "Form submitted successfully!";
            }
        }
    </script>

</body>
</html>
